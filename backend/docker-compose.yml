services:
  # ======================================
  # Backend API Service
  # ======================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testops-backend-api
    restart: unless-stopped
    
    # Environment variables
    environment:
      PORT: 8080
      MONGO_URL: mongodb://admin:admin123@mongo:27017
      TESTSCRIPTS_DIR: /app/testscripts
      RUNNER_DIR: /app
      SELENIUM_HUB_URL: http://selenium-hub:4444
      BACKEND_INTERNAL_URL: http://testops-backend-api:8080/api
      RUNNER_IMAGE: thex_runner:latest
      DOCKER_NETWORK: testops-db-network
      MONGO_HOST: testops-mongo
      MONGO_PORT: "27017"
      MONGO_USERNAME: admin
      MONGO_PASSWORD: admin123
      MONGO_DATABASE: testops
    
    # Port mapping: host:container
    ports:
      - "8080:8080"
    
    # Volume mounts for test execution
    volumes:
      - ../runner/testscripts:/app/testscripts
      - /var/run/docker.sock:/var/run/docker.sock
      - ../docker-compose.yml:/app/docker-compose.yml
      - ..:/app/project
    
    # Network configuration
    networks:
      - testops-network
    
    # Depends on MongoDB from database-microservice
    external_links:
      - testops-mongo:mongo

# ======================================
# Networks
# ======================================
networks:
  testops-network:
    external: true
    name: testops-db-network
