services:
  # ======================================
  # Backend API Service
  # ======================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testops-backend-api
    restart: unless-stopped
    
    # Environment variables
    environment:
      PORT: 8080
      MONGO_URL: mongodb://admin:admin123@mongo:27017
      TESTSCRIPTS_DIR: /app/testscripts
      RUNNER_DIR: /app
      SELENIUM_HUB_URL: http://selenium-hub:4444
      BACKEND_INTERNAL_URL: http://testops-backend-api:8080/api
      VISUAL_REGRESSION_SERVICE_URL: ${VISUAL_REGRESSION_SERVICE_URL:-http://visual-regression-service:8002}
      RUNNER_IMAGE: thex_runner:latest
      DOCKER_NETWORK: testops-db-network
      MONGO_HOST: testops-mongo
      MONGO_PORT: "27017"
      MONGO_USERNAME: admin
      MONGO_PASSWORD: admin123
      MONGO_DATABASE: testops
      EMAIL_AUTOSEND_ENABLED: ${EMAIL_AUTOSEND_ENABLED:-false}
      EMAIL_POLL_INTERVAL_SECONDS: ${EMAIL_POLL_INTERVAL_SECONDS:-20}
      EMAIL_BATCH_LIMIT: ${EMAIL_BATCH_LIMIT:-5}
      EMAIL_MAX_LOG_BYTES: ${EMAIL_MAX_LOG_BYTES:-500000}
      EMAIL_RETRY_FAILED: ${EMAIL_RETRY_FAILED:-false}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3456}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-true}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_INSECURE_SKIP_VERIFY: ${SMTP_INSECURE_SKIP_VERIFY:-false}
    
    # Port mapping: host:container
    ports:
      - "8080:8080"
    
    # Volume mounts for test execution
    volumes:
      - ../runner/testscripts:/app/testscripts
      - /var/run/docker.sock:/var/run/docker.sock
      - ../docker-compose.yml:/app/docker-compose.yml
      - ..:/app/project
    
    # Network configuration
    networks:
      - testops-network
    
    # Depends on MongoDB from database-microservice
    external_links:
      - testops-mongo:mongo

# ======================================
# Networks
# ======================================
networks:
  testops-network:
    external: true
    name: testops-db-network
