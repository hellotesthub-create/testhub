version: '3.8'

services:

  # MongoDB (Alternative to PostgreSQL)
  # mongo:
  #   image: mongo:7
  #   container_name: testops-mongo
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-testops}
  #     MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-testops123}
  #     MONGO_INITDB_DATABASE: ${MONGO_DB:-testops}
  #   volumes:
  #     - mongo_data:/data/db
  #     - ./database/mongo/init.js:/docker-entrypoint-initdb.d/init.js
  #   ports:
  #     - "27017:27017"
  #   networks:
  #     - testops-network


  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: testops-backend-api
    environment:
      PORT: ${PORT:-8080}
      JWT_SECRET: ${JWT_SECRET}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      MONGO_URL: ${MONGO_URL:-mongodb://admin:admin123@testops-mongo:27017/?authSource=admin}
      TESTSCRIPTS_DIR: /app/testscripts
      RUNNER_DIR: /app
      HOST_PROJECT_PATH: ${HOST_PROJECT_PATH:-}
      BACKEND_INTERNAL_URL: http://testops-backend-api:8080/api
      RUNNER_IMAGE: ${RUNNER_IMAGE:-thex_runner:latest}
      DOCKER_NETWORK: ${DOCKER_NETWORK:-testops-db-network}
      SELENIUM_HUB_URL: http://selenium-hub:4444
      MONGO_HOST: ${MONGO_HOST:-testops-mongo}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-admin123}
      MONGO_DATABASE: ${MONGO_DATABASE:-testops}

      EMAIL_AUTOSEND_ENABLED: ${EMAIL_AUTOSEND_ENABLED:-false}
      EMAIL_POLL_INTERVAL_SECONDS: ${EMAIL_POLL_INTERVAL_SECONDS:-20}
      EMAIL_BATCH_LIMIT: ${EMAIL_BATCH_LIMIT:-5}
      EMAIL_MAX_LOG_BYTES: ${EMAIL_MAX_LOG_BYTES:-500000}
      EMAIL_RETRY_FAILED: ${EMAIL_RETRY_FAILED:-false}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-}
      SMTP_INSECURE_SKIP_VERIFY: ${SMTP_INSECURE_SKIP_VERIFY:-}
    ports:
      - "8090:8080"
    volumes:
      - ./runner/testscripts:/app/testscripts
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/app/docker-compose.yml
      - ./:/app/project
    # No depends_on: postgres or redis
    networks:
      - testops-network
      - testops-db-network
    restart: unless-stopped

  # ============================
  # Selenium Grid (Hub + Nodes)
  # ============================

  # Selenium Hub - Central entry point for all WebDriver requests
  selenium-hub:
    image: selenium/hub:4.21.0
    container_name: selenium-hub
    environment:
      - GRID_MAX_SESSION=20
      - SE_SESSION_REQUEST_TIMEOUT=300
      - SE_NODE_SESSION_TIMEOUT=300
    ports:
      - "4442:4442"   # Event bus publish
      - "4443:4443"   # Event bus subscribe
      - "4444:4444"   # Hub web & WebDriver endpoint
    networks:
      - testops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Chrome Node - Scalable via: docker-compose up --scale chrome-node=5
  chrome-node:
    build:
      context: .
      dockerfile: docker/selenium-node-chrome-video.Dockerfile
    image: testhub/selenium-node-chrome-video:4.21.0
    # NO container_name — allows multiple replicas
    # Scale with: docker-compose up -d --scale chrome-node=3
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_RELAY_ONLY=false
      - SE_NODE_DETECT_DRIVERS=true
      - SE_NODE_MAX_SESSIONS=1
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_SCREEN_WIDTH=1920
      - SE_SCREEN_HEIGHT=1080
      - SE_SCREEN_DEPTH=24
      - SE_SCREEN_DPI=96
      - SE_START_XVFB=true
    volumes:
      - ./runner/output/videos:/videos:rw
    depends_on:
      selenium-hub:
        condition: service_healthy
    networks:
      - testops-network
    shm_size: '2gb'
    restart: unless-stopped

  # Firefox Node - Scalable via: docker-compose up --scale firefox-node=5
  firefox-node:
    build:
      context: .
      dockerfile: docker/selenium-node-firefox-video.Dockerfile
    image: testhub/selenium-node-firefox-video:4.21.0
    # NO container_name — allows multiple replicas
    # Scale with: docker-compose up -d --scale firefox-node=3
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_RELAY_ONLY=false
      - SE_NODE_DETECT_DRIVERS=true
      - SE_NODE_MAX_SESSIONS=1
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_SCREEN_WIDTH=1920
      - SE_SCREEN_HEIGHT=1080
      - SE_SCREEN_DEPTH=24
      - SE_SCREEN_DPI=96
      - SE_START_XVFB=true
    volumes:
      - ./runner/output/videos:/videos:rw
    depends_on:
      selenium-hub:
        condition: service_healthy
    networks:
      - testops-network
    shm_size: '2gb'
    restart: unless-stopped

  # Python Selenium Runner
  runner:
    build:
      context: ./runner
      dockerfile: Dockerfile
    image: thex_runner:latest
    container_name: testops-runner
    environment:
      PYTHONUNBUFFERED: "1"
      DISPLAY: ":99"
      MONGO_HOST: "testops-mongo"
      MONGO_PORT: "27017"
      MONGO_DATABASE: "testops"
      MONGO_USERNAME: "admin"
      MONGO_PASSWORD: "admin123"
    volumes:
      - ./runner/src:/app/src
      - ./runner/output:/app/output
      - ./runner/logs:/app/logs
      - ./runner/testscripts:/app/testscripts
      - ./runner/output/videos:/videos:rw
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - testops-network
      - testops-db-network
    depends_on:
      selenium-hub:
        condition: service_healthy
    # Run once and exit
    restart: "no"
    # Enable for Chrome to work properly
    shm_size: '2gb'

  # Frontend (React/Vite)
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: testops-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8090}
    ports:
      - "3456:3456"
    networks:
      - testops-network
    restart: unless-stopped

  # Nginx Gateway - REMOVED (using direct backend access on port 8080)
  # gateway:
  #   build:
  #     context: ./gateway
  #     dockerfile: Dockerfile
  #   container_name: testops-gateway
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./runner/output/videos:/app/videos
  #     - ./runner/output/screenshots:/app/screenshots
  #   depends_on:
  #     - backend
  #     - frontend
  #   networks:
  #     - testops-network
  #   restart: unless-stopped

networks:
  testops-network:
    driver: bridge
  testops-db-network:
    external: true

volumes:
  mongo_data:
