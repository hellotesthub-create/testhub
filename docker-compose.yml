version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: testops-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-testops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testops123}
      POSTGRES_DB: ${POSTGRES_DB:-testops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - testops-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-testops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB (Alternative to PostgreSQL)
  # mongo:
  #   image: mongo:7
  #   container_name: testops-mongo
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-testops}
  #     MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-testops123}
  #     MONGO_INITDB_DATABASE: ${MONGO_DB:-testops}
  #   volumes:
  #     - mongo_data:/data/db
  #     - ./database/mongo/init.js:/docker-entrypoint-initdb.d/init.js
  #   ports:
  #     - "27017:27017"
  #   networks:
  #     - testops-network

  # Redis Queue
  redis:
    image: redis:7-alpine
    container_name: testops-redis
    ports:
      - "6379:6379"
    networks:
      - testops-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: testops-backend
    environment:
      PORT: ${PORT:-8080}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8080:8080"
    volumes:
      - ./runner/testscripts:/app/testscripts
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/app/docker-compose.yml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - testops-network
      - testops-db-network
    restart: unless-stopped

  # Selenium Grid - Chrome Node
  selenium-chrome:
    image: selenium/standalone-chrome:latest
    container_name: selenium-chrome
    environment:
      - SE_SCREEN_WIDTH=1920
      - SE_SCREEN_HEIGHT=1080
      - SE_SCREEN_DEPTH=24
      - SE_SCREEN_DPI=96
      - SE_START_XVFB=true
      - SE_NODE_MAX_SESSIONS=5
      - SE_NODE_SESSION_TIMEOUT=300
    volumes:
      - /dev/shm:/dev/shm
      - ./runner/output/videos:/videos:rw
    ports:
      - "4444:4444"
      - "7900:7900"
    networks:
      - testops-network
    shm_size: '2gb'
    restart: unless-stopped

  # Selenium Grid - Firefox Node
  selenium-firefox:
    image: selenium/standalone-firefox:latest
    container_name: selenium-firefox
    environment:
      - SE_SCREEN_WIDTH=1920
      - SE_SCREEN_HEIGHT=1080
      - SE_SCREEN_DEPTH=24
      - SE_SCREEN_DPI=96
      - SE_START_XVFB=true
      - SE_NODE_MAX_SESSIONS=5
      - SE_NODE_SESSION_TIMEOUT=300
    volumes:
      - /dev/shm:/dev/shm
      - ./runner/output/videos:/videos:rw
    ports:
      - "4445:4444"
      - "7901:7900"
    networks:
      - testops-network
    shm_size: '2gb'
    restart: unless-stopped

  # Python Selenium Runner
  runner:
    build:
      context: ./runner
      dockerfile: Dockerfile
    container_name: testops-runner
    environment:
      PYTHONUNBUFFERED: "1"
      DISPLAY: ":99"
      MONGO_HOST: "testops-mongo"
      MONGO_PORT: "27017"
      MONGO_DATABASE: "testops"
      MONGO_USERNAME: "admin"
      MONGO_PASSWORD: "admin123"
    volumes:
      - ./runner/src:/app/src
      - ./runner/output:/app/output
      - ./runner/logs:/app/logs
      - ./runner/testscripts:/app/testscripts
      - ./runner/output/videos:/videos:rw
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - testops-network
      - testops-db-network
    depends_on:
      - selenium-chrome
      - selenium-firefox
    # Run once and exit
    restart: "no"
    # Enable for Chrome to work properly
    shm_size: '2gb'

  # Frontend (React/Vite)
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: testops-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
    ports:
      - "5173:5173"
    networks:
      - testops-network
    restart: unless-stopped

  # Nginx Gateway - REMOVED (using direct backend access on port 8080)
  # gateway:
  #   build:
  #     context: ./gateway
  #     dockerfile: Dockerfile
  #   container_name: testops-gateway
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./runner/output/videos:/app/videos
  #     - ./runner/output/screenshots:/app/screenshots
  #   depends_on:
  #     - backend
  #     - frontend
  #   networks:
  #     - testops-network
  #   restart: unless-stopped

networks:
  testops-network:
    driver: bridge
  testops-db-network:
    external: true

volumes:
  postgres_data:
  # mongo_data:
