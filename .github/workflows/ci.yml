name: TestHub CI

# Pipeline (per the TestHub CI design):
#   Developer Pushes Code
#         ↓
#   GitHub Actions Triggered
#         ↓
#   Frontend Build Validation ─┐
#   Backend  Build Validation  │
#   Runner   Validation        │ (every service, in parallel)
#   AI Diagnosis Validation    │
#   Database Validation       ─┘
#         ↓
#   Docker Image Validation
#         ↓
#   PASS / FAIL Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Frontend Build Validation ──────────────────────────────────────────
  frontend:
    name: Frontend Build Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  # ── Backend Build Validation ───────────────────────────────────────────
  backend:
    name: Backend Build Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum
      - name: Download modules
        run: go mod download
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...

  # ── Runner Validation ──────────────────────────────────────────────────
  runner:
    name: Runner Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: runner/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest mongomock
      - name: Syntax check (compile all sources)
        run: python -m compileall src
      - name: Unit tests
        run: pytest -q tests

  # ── AI Diagnosis Validation ────────────────────────────────────────────
  ai-diagnosis:
    name: AI Diagnosis Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: diagnosis_service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: diagnosis_service/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Syntax check
        run: python -m compileall main.py
      - name: Unit tests
        run: pytest -q

  # ── Database Validation ────────────────────────────────────────────────
  database:
    name: Database Validation
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: admin123
          MONGO_INITDB_DATABASE: testops
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Validate init-mongo.js syntax
        run: node --check database-microservice/init-mongo.js
      - name: Ping MongoDB
        run: |
          python -m pip install "pymongo>=4"
          python - <<'PY'
          from pymongo import MongoClient
          client = MongoClient(
              "mongodb://admin:admin123@localhost:27017/?authSource=admin",
              serverSelectionTimeoutMS=20000,
          )
          assert client.admin.command("ping").get("ok") == 1.0
          print("MongoDB reachable and healthy")
          PY

  # ── Docker Image Validation ────────────────────────────────────────────
  docker:
    name: Docker Image Validation
    runs-on: ubuntu-latest
    needs: [frontend, backend, runner, ai-diagnosis, database]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: frontend
            context: ./Frontend
            dockerfile: ./Frontend/Dockerfile
          - name: runner
            context: ./runner
            dockerfile: ./runner/Dockerfile
          - name: diagnosis-service
            context: ./diagnosis_service
            dockerfile: ./diagnosis_service/Dockerfile
          - name: selenium-chrome-node
            context: .
            dockerfile: ./docker/selenium-node-chrome-video.Dockerfile
          - name: selenium-firefox-node
            context: .
            dockerfile: ./docker/selenium-node-firefox-video.Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.name }} image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  # ── Compose Orchestration Validation ───────────────────────────────────
  compose:
    name: Compose Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate root docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet
      - name: Validate database-microservice compose
        run: docker compose -f database-microservice/docker-compose.yml config --quiet

  # ── PASS / FAIL Report ─────────────────────────────────────────────────
  report:
    name: PASS / FAIL Report
    runs-on: ubuntu-latest
    needs: [frontend, backend, runner, ai-diagnosis, database, docker, compose]
    if: always()
    steps:
      - name: Build report
        run: |
          fe="${{ needs.frontend.result }}"
          be="${{ needs.backend.result }}"
          rn="${{ needs.runner.result }}"
          ai="${{ needs.ai-diagnosis.result }}"
          db="${{ needs.database.result }}"
          dk="${{ needs.docker.result }}"
          cp="${{ needs.compose.result }}"

          icon() { [ "$1" = "success" ] && echo " PASS" || echo "❌ FAIL"; }

          {
            echo "## TestHub CI — Validation Report"
            echo ""
            echo "| Service / Stage | Result |"
            echo "| --- | --- |"
            echo "| Frontend Build Validation | $(icon "$fe") |"
            echo "| Backend Build Validation | $(icon "$be") |"
            echo "| Runner Validation | $(icon "$rn") |"
            echo "| AI Diagnosis Validation | $(icon "$ai") |"
            echo "| Database Validation | $(icon "$db") |"
            echo "| Docker Image Validation | $(icon "$dk") |"
            echo "| Compose Validation | $(icon "$cp") |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$fe" = "success" ] && [ "$be" = "success" ] && [ "$rn" = "success" ] \
             && [ "$ai" = "success" ] && [ "$db" = "success" ] && [ "$dk" = "success" ] \
             && [ "$cp" = "success" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "###  Overall: PASS" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "###  Overall: FAIL" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::TestHub CI failed — see the validation report in the job summary."
            exit 1
          fi
