name: TestHub CI

# Pipeline (per the TestHub CI design):
#   Developer Pushes Code
#         ↓
#   GitHub Actions Triggered
#         ↓
#   Frontend Build Validation ─┐
#   Backend  Build Validation ─┤ (run in parallel)
#   Runner   Validation       ─┘
#         ↓
#   Docker Image Validation
#         ↓
#   PASS / FAIL Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Frontend Build Validation ──────────────────────────────────────────
  frontend:
    name: Frontend Build Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  # ── Backend Build Validation ───────────────────────────────────────────
  backend:
    name: Backend Build Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum
      - name: Download modules
        run: go mod download
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...

  # ── Runner Validation ──────────────────────────────────────────────────
  runner:
    name: Runner Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: runner/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest mongomock
      - name: Syntax check (compile all sources)
        run: python -m compileall src
      - name: Unit tests
        run: pytest -q

  # ── Docker Image Validation ────────────────────────────────────────────
  docker:
    name: Docker Image Validation
    runs-on: ubuntu-latest
    needs: [frontend, backend, runner]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: frontend
            context: ./Frontend
            dockerfile: ./Frontend/Dockerfile
          - name: runner
            context: ./runner
            dockerfile: ./runner/Dockerfile
          - name: diagnosis-service
            context: ./diagnosis_service
            dockerfile: ./diagnosis_service/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.name }} image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  # ── PASS / FAIL Report ─────────────────────────────────────────────────
  report:
    name: PASS / FAIL Report
    runs-on: ubuntu-latest
    needs: [frontend, backend, runner, docker]
    if: always()
    steps:
      - name: Build report
        run: |
          fe="${{ needs.frontend.result }}"
          be="${{ needs.backend.result }}"
          rn="${{ needs.runner.result }}"
          dk="${{ needs.docker.result }}"

          icon() { [ "$1" = "success" ] && echo "✅ PASS" || echo "❌ FAIL"; }

          {
            echo "## TestHub CI — Validation Report"
            echo ""
            echo "| Stage | Result |"
            echo "| --- | --- |"
            echo "| Frontend Build Validation | $(icon "$fe") |"
            echo "| Backend Build Validation | $(icon "$be") |"
            echo "| Runner Validation | $(icon "$rn") |"
            echo "| Docker Image Validation | $(icon "$dk") |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$fe" = "success" ] && [ "$be" = "success" ] && [ "$rn" = "success" ] && [ "$dk" = "success" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### ✅ Overall: PASS" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### ❌ Overall: FAIL" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::TestHub CI failed — see the validation report in the job summary."
            exit 1
          fi
